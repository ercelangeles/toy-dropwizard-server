name: "dropwizard-ci-pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      -main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v1
      - name: Install Java
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Build with Gradle
        working-directory: ./
        run: |
          chmod +x gradlew
          ./gradlew build -x test
      - name: Run tests
        working-directory: ./
        run: ./gradlew test
